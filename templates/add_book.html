{% extends 'base.html' %}
{% block title %}Add Book - Library MS{% endblock %}
{% block page_title %}<i class="fas fa-plus-circle"></i> Add New Book{% endblock %}
{% block content %}
<div class="form-card">
    <form method="POST" class="lms-form">
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-heading"></i> Book Title *</label>
                <input type="text" name="title" placeholder="Enter book title" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user-pen"></i> Author *</label>
                <input type="text" name="author" placeholder="Enter author name" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-barcode"></i> ISBN</label>
                <input type="text" name="isbn" placeholder="e.g. 978-0000000000">
            </div>
            <div class="form-group">
                <label><i class="fas fa-tag"></i> Category</label>
                <input type="text" name="category" placeholder="e.g. Computer Science" list="cat-list">
                <datalist id="cat-list">
                    <option value="Computer Science">
                    <option value="Management">
                    <option value="Engineering">
                    <option value="Programming">
                    <option value="Mathematics">
                    <option value="Physics">
                    <option value="Chemistry">
                    <option value="Biology">
                    <option value="History">
                    <option value="Literature">
                    <option value="Research">
                </datalist>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-building"></i> Publisher</label>
                <input type="text" name="publisher" placeholder="Enter publisher name">
            </div>
            <div class="form-group">
                <label><i class="fas fa-calendar"></i> Publication Year</label>
                <input type="number" name="year" placeholder="e.g. 2023" min="1900" max="2030">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-copy"></i> Number of Copies</label>
                <input type="number" name="copies" value="1" min="1" required>
            </div>
        </div>
        <div class="form-group full-width">
            <label><i class="fas fa-align-left"></i> Description</label>
            <textarea name="description" rows="3" placeholder="Short description of the book..."></textarea>
        </div>
        <div class="form-buttons">
            <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Book</button>
            <a href="{{ url_for('books') }}" class="btn-secondary"><i class="fas fa-times"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
