{% extends 'base.html' %}
{% block title %}Add Member - Library MS{% endblock %}
{% block page_title %}<i class="fas fa-user-plus"></i> Add New Member{% endblock %}
{% block content %}
<div class="form-card">
    <form method="POST" class="lms-form">
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Full Name *</label>
                <input type="text" name="name" placeholder="Enter full name" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address *</label>
                <input type="email" name="email" placeholder="Enter email" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password *</label>
                <input type="password" name="password" placeholder="Set a password" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Phone Number</label>
                <input type="tel" name="phone" placeholder="e.g. 9876543210">
            </div>
        </div>
        <div class="form-group full-width">
            <label><i class="fas fa-map-marker-alt"></i> Address</label>
            <textarea name="address" rows="2" placeholder="Enter address..."></textarea>
        </div>
        <div class="form-buttons">
            <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Add Member</button>
            <a href="{{ url_for('members') }}" class="btn-secondary"><i class="fas fa-times"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
