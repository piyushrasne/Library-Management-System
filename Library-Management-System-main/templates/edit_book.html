{% extends 'base.html' %}
{% block title %}Edit Book - Library MS{% endblock %}
{% block page_title %}<i class="fas fa-edit"></i> Edit Book{% endblock %}
{% block content %}
<div class="form-card">
    <form method="POST" class="lms-form">
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-heading"></i> Book Title *</label>
                <input type="text" name="title" value="{{ book.title }}" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user-pen"></i> Author *</label>
                <input type="text" name="author" value="{{ book.author }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-barcode"></i> ISBN</label>
                <input type="text" name="isbn" value="{{ book.isbn or '' }}">
            </div>
            <div class="form-group">
                <label><i class="fas fa-tag"></i> Category</label>
                <input type="text" name="category" value="{{ book.category or '' }}" list="cat-list">
                <datalist id="cat-list">
                    <option value="Computer Science">
                    <option value="Management">
                    <option value="Engineering">
                    <option value="Programming">
                    <option value="Mathematics">
                </datalist>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-building"></i> Publisher</label>
                <input type="text" name="publisher" value="{{ book.publisher or '' }}">
            </div>
            <div class="form-group">
                <label><i class="fas fa-calendar"></i> Publication Year</label>
                <input type="number" name="year" value="{{ book.year or '' }}" min="1900" max="2030">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-copy"></i> Total Copies</label>
                <input type="number" name="copies" value="{{ book.total_copies }}" min="1" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-info-circle"></i> Currently Available</label>
                <input type="text" value="{{ book.available_copies }}/{{ book.total_copies }}" disabled class="input-disabled">
            </div>
        </div>
        <div class="form-group full-width">
            <label><i class="fas fa-align-left"></i> Description</label>
            <textarea name="description" rows="3">{{ book.description or '' }}</textarea>
        </div>
        <div class="form-buttons">
            <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Update Book</button>
            <a href="{{ url_for('books') }}" class="btn-secondary"><i class="fas fa-times"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
